<!DOCTYPE html>
<html>
<head>
    <title>SwagaRuney's Stuff! - Home</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <style>
        @font-face {
            font-family: 'Swag';
            src: url('fonts/swag.ttf') format('truetype');
        }

        @keyframes moveBG {
            from { background-position: 0 0, 0 0; }
            to   { background-position: 0 -500px, 0 0; }
        }

        body {
            background-image: url('images/bg2.png'), url('images/bg.png');
            background-size: cover, cover;
            background-repeat: repeat-y, repeat-y;
            background-attachment: fixed, fixed;
            font-family: 'Swag', sans-serif;
            text-align: center;
            animation: moveBG 40s linear infinite;
        }

        #userDisplay {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px 15px;
            font-size: 18px;
            color: rgb(0, 0, 0);
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 4px;
            font-family: 'Swag', sans-serif;
            z-index: 1;
        }

        #confirmBtn {
            font-family: 'Swag', sans-serif;
        }

        #dropZone {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none; /* keep this if you don't want it blocking clicks */
        }

        #wipPopup {
            display: none; /* Prevents flash before JS runs */
        }
    </style>
</head>

<body>

    <!-- W.I.P WARNING POPUP -->
    <div id="wipPopup" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0,0,0,0.85);
        color: white;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 999999;
        font-family: 'Swag', sans-serif;
        text-align: center;
        opacity: 1;
        transition: opacity 0.8s ease;
    ">
        <h1 style="font-size: 48px; margin-bottom: 20px;">⚠ W.I.P WARNING ⚠</h1>
        <p style="font-size: 24px; width: 70%; line-height: 1.4;">
            This website is currently a Work In Progress!  
            Some features may be unfinished, broken, or subject to change.
        </p>
        <button onclick="closeWipPopup()" style="
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 20px;
            font-family: 'Swag', sans-serif;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        ">I Understand</button>
    </div>

    <!-- MUSIC PLAYER -->
    <audio id="musicPlayer" loop muted style="
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 9999;
        background: rgba(0,0,0,0.5);
        padding: 6px;
        border-radius: 6px;
    ">
        <source src="music/song.ogg" type="audio/ogg">
    </audio>

    <!-- VOLUME SLIDER -->
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" style="
        position: fixed;
        bottom: 500px;
        right: 10px;
        z-index: 1;
        transform: rotate(-90deg);
        width: 120px;
        accent-color: #852929;
    ">

    <!-- DRAG & DROP ZONE -->
    <div id="dropZone"></div>

    <!-- USER DISPLAY -->
    <div id="userDisplay"></div>

    <h1>Welcome to My Website!</h1>

    <input type="text" id="username" placeholder="Username Here:">
    <button id="confirmBtn" onclick="greetUser(document.getElementById('username').value)">
        Confirm
    </button>

    <!-- DEV BUTTON -->
    <button id="devBtn" onclick="clearAllData()" style="
        position: fixed;
        bottom: 10px;
        right: 10px;
        padding: 8px 12px;
        background-color: #ff0000;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
    ">DEV: Clear All</button>

    <script>
    // =========================
    // WIP POPUP
    // =========================
    function closeWipPopup() {
        const popup = document.getElementById("wipPopup");
        popup.style.opacity = "0";

        setTimeout(() => {
            popup.style.display = "none";
            localStorage.setItem("wipAccepted", "true");
        }, 800);
    }

    window.addEventListener("DOMContentLoaded", () => {
        const popup = document.getElementById("wipPopup");
        if (localStorage.getItem("wipAccepted") !== "true") {
            popup.style.display = "flex";
            popup.style.opacity = "1";
        }
    });

    // =========================
    // AUDIO + VOLUME + DRAG & DROP
    // =========================
    const player = document.getElementById("musicPlayer");
    const volumeSlider = document.getElementById("volumeSlider");
    const dropZone = document.getElementById("dropZone");

    // Load saved volume
    let savedVolume = localStorage.getItem("savedVolume");
    if (savedVolume !== null) {
        savedVolume = parseFloat(savedVolume);
        player.volume = savedVolume;
        volumeSlider.value = savedVolume;
    } else {
        player.volume = 0.2;
        volumeSlider.value = 0.2;
    }

    // Start muted, not playing
    player.muted = true;

    // Enable audio ONLY after user interaction AND volume > 0
    function enableAudio() {
        if (player.volume > 0) {
            player.muted = false;
            player.play().catch(() => {});
        }
        window.removeEventListener("click", enableAudio);
        window.removeEventListener("keydown", enableAudio);
    }

    window.addEventListener("click", enableAudio);
    window.addEventListener("keydown", enableAudio);

    // Volume slider logic
    volumeSlider.addEventListener("input", () => {
        const vol = parseFloat(volumeSlider.value);
        player.volume = vol;
        localStorage.setItem("savedVolume", vol);

        if (vol === 0) {
            player.muted = true;
        } else if (!player.muted) {
            player.play().catch(() => {});
        }
    });

    // Drag & drop audio
    dropZone.addEventListener("dragover", (e) => e.preventDefault());

    dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (!file) return;

        if (!file.type.startsWith("audio/")) {
            alert("Please drop an audio file.");
            return;
        }

        const url = URL.createObjectURL(file);
        player.src = url;

        if (!player.muted && player.volume > 0) {
            player.play().catch(() => {});
        }
    });

    // =========================
    // USERNAME + DISPLAY
    // =========================
    function greetUser(name) {
        if (!name) {
            alert("Please enter your name.");
            return;
        }
        localStorage.setItem('username', name);
        updateUserDisplay(name);
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('username').style.display = 'none';
    }

    function loadUsername() {
        const savedName = localStorage.getItem('username');
        if (savedName) {
            document.getElementById('username').value = savedName;
            updateUserDisplay(savedName);
            document.getElementById('confirmBtn').style.display = 'none';
            document.getElementById('username').style.display = 'none';
        } else {
            updateUserDisplay("No User");
        }
    }

    function updateUserDisplay(name) {
        const userDisplay = document.getElementById('userDisplay');
        userDisplay.textContent = "User: " + name;
        userDisplay.style.display = 'block';
    }

    window.onload = loadUsername;

    // =========================
    // DEV CLEAR
    // =========================
    function clearAllData() {
        if (confirm('Clear all data? This cannot be undone.')) {
            localStorage.clear();
            localStorage.removeItem("wipAccepted");

            document.getElementById('username').value = '';
            document.getElementById('username').style.display = 'inline';
            document.getElementById('confirmBtn').style.display = 'inline';
            document.getElementById('userDisplay').textContent = '';
            document.getElementById('userDisplay').style.display = 'none';
            alert('All data cleared.');
            location.reload();
        }
    }
    </script>

</body>
</html>
