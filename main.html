<!DOCTYPE html>
<html>
<head>
    <title>SwagaRuney's Stuff! - Home</title>

    <style>
        @font-face {
            font-family: 'Swag';
            src: url('fonts/swag.ttf') format('truetype');
        }

        @keyframes moveBG {
            from { background-position: 0 0, 0 0; }
            to   { background-position: 0 -500px, 0 0; }
        }

        body {
            background-image: url('images/bg2.png'), url('images/bg.png');
            background-size: cover, cover;
            background-repeat: repeat-y, repeat-y;
            background-attachment: fixed, fixed;
            font-family: 'Swag', sans-serif;
            text-align: center;
            animation: moveBG 40s linear infinite;
        }

        #userDisplay {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px 15px;
            font-size: 18px;
            color: rgb(0, 0, 0);
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 4px;
            font-family: 'Swag', sans-serif;
            z-index: 1;
        }

        #confirmBtn {
            font-family: 'Swag', sans-serif;
        }

        #dropZone {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }
        #wipPopup {
            display: none; /* Prevents flash before JS runs */
        }

    </style>
</head>

<body>

    <!-- W.I.P WARNING POPUP -->
    <div id="wipPopup" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0,0,0,0.85);
        color: white;
        display: none; /* Hidden by default */
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 999999;
        font-family: 'Swag', sans-serif;
        text-align: center;
        opacity: 1;
        transition: opacity 0.8s ease;
    ">
        <h1 style="font-size: 48px; margin-bottom: 20px;">⚠ W.I.P WARNING ⚠</h1>
        <p style="font-size: 24px; width: 70%; line-height: 1.4;">
            This website is currently a Work In Progress!  
            Some features may be unfinished, broken, or subject to change.
        </p>
        <button onclick="closeWipPopup()" style="
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 20px;
            font-family: 'Swag', sans-serif;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        ">I Understand</button>
    </div>

    <!-- MUSIC PLAYER -->
    <audio id="musicPlayer" autoplay loop muted style="
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 9999;
        background: rgba(0,0,0,0.5);
        padding: 6px;
        border-radius: 6px;
    ">
        <source src="music/song.ogg" type="audio/ogg">
    </audio>

    <!-- VOLUME SLIDER -->
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" style="
        position: fixed;
        bottom: 500px;
        right: 10px;
        z-index: 1;
        transform: rotate(-90deg);
        width: 120px;
        accent-color: #852929;
    ">

    <!-- AUTOPLAY + UNMUTE -->
    <script>
    window.addEventListener("load", () => {
        const player = document.getElementById("musicPlayer");

        player.play().then(() => {
            setTimeout(() => player.muted = false, 200);
        }).catch(() => {
            setTimeout(() => {
                player.play().then(() => {
                    setTimeout(() => player.muted = false, 200);
                });
            }, 300);
        });
    });
    </script>

<script>
function closeWipPopup() {
    const popup = document.getElementById("wipPopup");
    popup.style.opacity = "0";

    setTimeout(() => {
        popup.style.display = "none";
        localStorage.setItem("wipAccepted", "true");
    }, 800);
}

// Show popup ONLY if not accepted
window.addEventListener("DOMContentLoaded", () => {
    const popup = document.getElementById("wipPopup");

    if (localStorage.getItem("wipAccepted") !== "true") {
        popup.style.display = "flex";   // show it
        popup.style.opacity = "1";      // ensure visible
    }
});
</script>
    <!-- DRAG & DROP ZONE -->
    <div id="dropZone"></div>

    <!-- DRAG & DROP SCRIPT -->
    <script>
        const player = document.getElementById("musicPlayer");
        const dropZone = document.getElementById("dropZone");

        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
        });

        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();

            const file = e.dataTransfer.files[0];
            if (!file) return;

            if (!file.type.startsWith("audio/")) {
                alert("Please drop an audio file.");
                return;
            }

            const url = URL.createObjectURL(file);
            player.src = url;
            player.play();
        });
    </script>

    <!-- VOLUME SLIDER SCRIPT -->
    <script>
    // One shared player reference for ALL scripts
    const player = document.getElementById("musicPlayer");

    // AUTOPLAY + UNMUTE
    window.addEventListener("load", () => {
        player.play().then(() => {
            setTimeout(() => player.muted = false, 200);
        }).catch(() => {
            setTimeout(() => {
                player.play().then(() => {
                    setTimeout(() => player.muted = false, 200);
                });
            }, 300);
        });
    });
</script>

<!-- DRAG & DROP SCRIPT -->
<script>
    const dropZone = document.getElementById("dropZone");

    dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
    });

    dropZone.addEventListener("drop", (e) => {
        e.preventDefault();

        const file = e.dataTransfer.files[0];
        if (!file) return;

        if (!file.type.startsWith("audio/")) {
            alert("Please drop an audio file.");
            return;
        }

        const url = URL.createObjectURL(file);
        player.src = url;
        player.play();
    });
</script>

<!-- VOLUME SLIDER SCRIPT -->
<script>
    const volumeSlider = document.getElementById("volumeSlider");

    // Load saved volume (if exists)
    const savedVolume = localStorage.getItem("savedVolume");
    if (savedVolume !== null) {
        player.volume = savedVolume;
        volumeSlider.value = savedVolume;
    } else {
        player.volume = 0.2;
        volumeSlider.value = 0.2;
    }

    // Save + apply volume when slider moves
    volumeSlider.addEventListener("input", () => {
        player.volume = volumeSlider.value;
        localStorage.setItem("savedVolume", volumeSlider.value);
    });
</script>
    <!-- USER DISPLAY -->
    <div id="userDisplay"></div>

    <h1>Welcome to My Website!</h1>

    <input type="text" id="username" placeholder="Username Here:">
    <button id="confirmBtn" onclick="greetUser(document.getElementById('username').value)">
        Confirm
    </button>

    <script>
        function greetUser(name) {
            if (!name) {
                alert("Please enter your name.");
                return;
            }
            localStorage.setItem('username', name);
            updateUserDisplay(name);
            document.getElementById('confirmBtn').style.display = 'none';
            document.getElementById('username').style.display = 'none';
        }

        function loadUsername() {
            const savedName = localStorage.getItem('username');

            if (savedName) {
                document.getElementById('username').value = savedName;
                updateUserDisplay(savedName);
                document.getElementById('confirmBtn').style.display = 'none';
                document.getElementById('username').style.display = 'none';
            } else {
                updateUserDisplay("No User");
            }
        }

        function updateUserDisplay(name) {
            document.getElementById('userDisplay').textContent = "User: " + name;
            document.getElementById('userDisplay').style.display = 'block';
        }

        window.onload = loadUsername;
    </script>

    <!-- DEV BUTTON -->
    <button id="devBtn" onclick="clearAllData()" style="
        position: fixed;
        bottom: 10px;
        right: 10px;
        padding: 8px 12px;
        background-color: #ff0000;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
    ">DEV: Clear All</button>

    <script>
    function clearAllData() {
        if (confirm('Clear all data? This cannot be undone.')) {
            localStorage.clear();
            localStorage.removeItem("wipAccepted"); // reset WIP popup

            document.getElementById('username').value = '';
            document.getElementById('username').style.display = 'inline';
            document.getElementById('confirmBtn').style.display = 'inline';
            document.getElementById('userDisplay').textContent = '';
            document.getElementById('userDisplay').style.display = 'none';
            alert('All data cleared.');
            location.reload();
        }
    }
    </script>


</body>
</html>
